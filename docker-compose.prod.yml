services:
  backend:
    build: ./backend
    container_name: shotlink-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: shotlink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: shotlink-postgres
    environment:
      POSTGRES_DB: shotlink
      POSTGRES_USER: shotlink
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shotlink"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: shotlink-redis
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: shotlink-rabbitmq
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: shotlink-minio
    command: server /data
    restart: unless-stopped

volumes:
  pgdata:
