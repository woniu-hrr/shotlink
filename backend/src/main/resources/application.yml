server:
  port: 9090

spring:
  application:
    name: shotlink

  profiles:
    active: dev

  # Database
  datasource:
    url: jdbc:postgresql://localhost:5432/shotlink
    username: shotlink
    password: shotlink123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  # JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

  # Flyway (database migration)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: shotlink
    password: shotlink123

  # File Upload
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# JWT
jwt:
  secret: ${JWT_SECRET:shotlink-dev-secret-key-2026-min-length-256-bits}
  access-token-expiration: 900000       # 15 minutes (milliseconds)
  refresh-token-expiration: 604800000    # 7 days (milliseconds)

# MinIO (S3-compatible object storage)
minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket: shotlink-images

# Actuator (health checks)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# Logging
logging:
  level:
    com.shotlink: DEBUG
    org.springframework.security: DEBUG
